name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Check for .cache hit
        uses: actions/cache@v5
        with:
          key: util-build-cache
          path: .cache
      
      - name: Install Dependencies
        run: npm install

      - name: Build ./dist/dep.bin
        id: build
        run: npm run build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: dist/dep.bin

      - name: Run Tests
        run: npm run test:ci
