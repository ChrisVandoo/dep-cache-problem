name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Restore .cache
        uses: actions/cache@v5
        with:
          key: util-build-cache
          path: .cache
      
      - name: Install Dependencies
        run: npm install

      - name: Build ./dist/dep.bin
        run: npm run build

      - name: Run Tests
        run: npm run test:ci
